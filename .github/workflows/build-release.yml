name: Build Files App for Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: files-community/Files
        
    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.102'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Install Windows App SDK 1.8
      shell: pwsh
      run: |
        $installerUrl = "https://aka.ms/windowsappsdk/1.8/1.8.260209005/windowsappruntimeinstall-x64.exe"
        $installerPath = "$env:TEMP\windowsappruntimeinstall-x64.exe"
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        Start-Process -FilePath $installerPath -ArgumentList "/quiet" -Wait
        
    - name: Restore NuGet packages
      run: dotnet restore Files.slnx /p:RuntimeIdentifier=win-x64 /p:PublishReadyToRun=false
      
    - name: Build Files.Package
      run: msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:PublishReadyToRun=false /p:AppxBundle=Always /p:UapAppxPackageBuildMode=SideloadOnly
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Files-App-Windows-x64
        path: |
          **/AppPackages/**/*.msix
          **/AppPackages/**/*.msixbundle
        retention-days: 7
