name: Build Files App (Release)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022

    env:
      REPO_URL: https://github.com/files-community/Files
      SOLUTION_FILE: Files.slnx
      CONFIGURATION: Release
      PLATFORM: x64
      DOTNET_VERSION: 10.0.x

    steps:
      # 1️⃣ Clone external repo
      - name: Clone Files repository
        run: |
          git clone $env:REPO_URL
          cd Files
          git submodule update --init --recursive

      # 2️⃣ Setup .NET 10 SDK
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3️⃣ Download Windows App SDK 1.8
      - name: Download Windows App SDK 1.8
        run: |
          Invoke-WebRequest `
            -Uri "https://aka.ms/windowsappsdk/1.8/1.8.260209005/windowsappruntimeinstall-x64.exe" `
            -OutFile "windowsappruntimeinstall-x64.exe"

      # 4️⃣ Install Windows App SDK silently
      - name: Install Windows App SDK 1.8
        run: |
          Start-Process `
            -FilePath ".\windowsappruntimeinstall-x64.exe" `
            -ArgumentList "/quiet /norestart" `
            -Wait

      # 5️⃣ Setup MSBuild (VS2022)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 6️⃣ Restore dependencies
      - name: Restore
        working-directory: Files
        run: |
          msbuild $env:SOLUTION_FILE `
            /t:Restore `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM

      # 7️⃣ Build Release x64 MSIX
      - name: Build Release
        working-directory: Files
        run: |
          msbuild $env:SOLUTION_FILE `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms=$env:PLATFORM `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:GenerateAppInstallerFile=false

      # 8️⃣ Upload artifacts
      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Files-Release-x64
          path: |
            Files/**/AppPackages/**
            Files/**/*.msixbundle
            Files/**/*.appxbundle
